      description: Get paginated list of videos filtered by tag ID
      parameters:
      - description: Tag ID
        in: path
        name: tagId
        required: true
        type: integer
      - default: 20
        description: Limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
