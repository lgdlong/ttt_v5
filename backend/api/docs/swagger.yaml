        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ttt-project_ttt_v5_backend_internal_domain_dto.ErrorResponse'
      summary: Create a new tag
      tags:
      - admin
  /admin/tags/{tagId}:
    delete:
