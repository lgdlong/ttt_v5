      summary: Delete a tag
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: Update an existing tag (admin only)
      parameters:
      - description: Tag ID
        in: path
        name: tagId
        required: true
        type: integer
      - description: Tag data
        in: body
        name: tag
