name: ttt-v5

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:17-alpine
    container_name: ttt-v5-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: '-E UTF8 --locale=C'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ttt-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ============================================
  # API Backend Service
  # ============================================
  backend:
    build: ./backend
    container_name: ttt-v5-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: 'postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ttt-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.ttt-backend.rule=PathPrefix(`/api`)'
      - 'traefik.http.routers.ttt-backend.entrypoints=web'
      - 'traefik.http.services.ttt-backend.loadbalancer.server.port=8080'

  # ============================================
  # Frontend Web Service
  # ============================================
  frontend:
    build: ./frontend
    container_name: ttt-v5-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - ttt-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.ttt-frontend.rule=PathPrefix(`/`)'
      - 'traefik.http.routers.ttt-frontend.entrypoints=web'
      - 'traefik.http.services.ttt-frontend.loadbalancer.server.port=3000'

volumes:
  postgres_data:
    driver: local

networks:
  ttt-network:
    driver: bridge
